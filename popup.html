<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Tax Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h1>Tax Settings</h1>

  <!-- Radios all grouped together -->
  <div id="modeSelection">
    <label><input type="radio" name="mode" value="Canada"> Canada</label>
    <label><input type="radio" name="mode" value="US"> United States</label>
    <label><input type="radio" name="mode" value="Custom"> Custom Rate</label>
  </div>

  <!-- Controls below radios -->
  <div id="controls">
    <div id="canadaSection" class="section">
      <label for="canadaRegion">Province:</label>
      <select id="canadaRegion"></select>
    </div>

    <div id="usSection" class="section">
      <label for="usRegion">State:</label>
      <select id="usRegion"></select>
    </div>

    <div id="customSection" class="section">
      <label for="customRate">Custom Tax Rate (%):</label>
      <input type="number" id="customRate" step="0.01" min="0" placeholder="e.g. 8.5" />
    </div>
  </div>

  <button id="saveBtn">Save Settings</button>

  <script src="popup.js"></script>
</body>


</html>
